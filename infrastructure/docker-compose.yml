version: "3.9"

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-symptaai}
      POSTGRES_USER: ${POSTGRES_USER:-symptaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-symptaai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-symptaai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-symptaai}:${POSTGRES_PASSWORD:-symptaai_secret}@postgres:5432/${POSTGRES_DB:-symptaai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Celery Workers
  # ─────────────────────────────────────────
  worker-analysis:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-symptaai}:${POSTGRES_PASSWORD:-symptaai_secret}@postgres:5432/${POSTGRES_DB:-symptaai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      - backend
    volumes:
      - ../backend:/app
    command: celery -A app.workers.tasks worker -Q analysis -c 2 -l info --logfile=/dev/stdout
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-reports:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-symptaai}:${POSTGRES_PASSWORD:-symptaai_secret}@postgres:5432/${POSTGRES_DB:-symptaai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      - backend
    volumes:
      - ../backend:/app
    command: celery -A app.workers.tasks worker -Q reports -c 2 -l info --logfile=/dev/stdout

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-symptaai}:${POSTGRES_PASSWORD:-symptaai_secret}@postgres:5432/${POSTGRES_DB:-symptaai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      - backend
    volumes:
      - ../backend:/app
    command: celery -A app.workers.tasks beat -l info --logfile=/dev/stdout

  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.tasks flower --port=5555

  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  default:
    name: symptaai_network
