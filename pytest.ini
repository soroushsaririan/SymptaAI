[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require running services)
    slow: Tests that take more than 2 seconds
